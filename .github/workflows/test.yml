# Validates homelab configurations in every push/pull request.
# - gateway: shell scripts + nftables + hostapd
# - nix: evaluates the flake (syntax and module options)

name: CI

on: [push, pull_request]

jobs:
  gateway:
    name: Gateway (Alpine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Shellcheck scripts
        run: |
          touch gateway/secrets.env
          shellcheck -x gateway/install.sh gateway/health/*.sh gateway/etc/init.d/*

      - name: Verify POSIX syntax
        run: sh -n gateway/install.sh gateway/health/*.sh

      - name: Validate nftables
        run: |
          sudo apt-get install -y -qq nftables
          sudo nft -c -f gateway/etc/nftables.nft

      - name: Validate hostapd
        run: |
          sudo apt-get install -y -qq hostapd gettext
          WPA_PASSPHRASE=dummy_test_pass \
            envsubst '${WPA_PASSPHRASE}' < gateway/etc/hostapd/hostapd.conf > /tmp/hostapd.test.conf
          sudo hostapd -t /tmp/hostapd.test.conf

  nix:
    name: NixOS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # cachix/install-nix-action installs Nix on the runner.
      # If the flake's nixpkgs version changes, update
      # the nix_path to match.
      - name: Install nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-26.05

      # Evaluates the Flake file without building anything. Detects
      # syntax errors, invalid module options, broken
      # references, etc.
      - name: Evaluate flake
        run: nix flake check
        working-directory: nix
