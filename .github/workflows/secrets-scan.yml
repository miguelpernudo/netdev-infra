# Scan commits for secrets (tokens, keys, etc.)
# using gitleaks. If anything is found, the workflow fails.
#
# False positives are ignored using a .gitleaks.toml file
# in the root of the repo.

name: Secrets scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
