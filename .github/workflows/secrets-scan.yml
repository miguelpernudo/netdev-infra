# Escanea commits en busca de secretos (tokens, claves, etc.)
# usando gitleaks. Si encuentra algo, el workflow falla.
#
# Los falsos positivos se ignoran con un archivo .gitleaks.toml
# en la raiz del repo.

name: Secrets scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
